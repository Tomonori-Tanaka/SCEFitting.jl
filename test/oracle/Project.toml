# Oracle test environment: validates MagestyRebuild's from-scratch numerics
# against Magesty.jl, used as a numerical oracle. This env is intentionally
# separate so the core test suite never depends on Magesty.
#
# Run:  julia --project=test/oracle test/oracle/runtests.jl
#
# Pinned Magesty.jl rev: 1e804f8a1ad76b211244000ff1eb7333f717e282 (branch main).
# Keep the local Magesty.jl checkout at this rev for reproducible comparisons.

[deps]
LinearAlgebra = "37e2e46d-f89d-539d-b4ee-838fcccc9c8e"
Magesty = "329bda51-4b33-4ad1-95c9-f0535f133d43"
MagestyRebuild = "854eb3e0-bd75-4c3b-927c-573f5c6d8b1d"
Random = "9a3f8284-a2c9-5f02-9a11-845980a1fd5c"
Spglib = "f761d5c5-86db-4880-b97f-9680a7cccfb5"
StaticArrays = "90137ffa-7385-5640-81b9-e52037218182"
Test = "8dfed614-e22c-5e08-85e1-65c5234f0b40"
WignerSymbols = "9f57e263-0b3d-5e2e-b1be-24f2bb48858b"

[sources]
Magesty = {path = "../../../Magesty.jl"}
MagestyRebuild = {path = "../.."}
